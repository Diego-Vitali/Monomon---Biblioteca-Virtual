<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MONOMON - Autenticação</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        indigo_ink: { DEFAULT: '#360568', 100: '#0b0114', 200: '#150229', 300: '#20033d', 400: '#2b0452', 500: '#360568', 600: '#5e08b3', 700: '#8618f4', 800: '#ae65f8', 900: '#d7b2fb' },
                        indigo_velvet: { DEFAULT: '#5b2a86', 100: '#12091b', 200: '#251136', 300: '#371a51', 400: '#4a226d', 500: '#5b2a86', 600: '#7f3bba', 700: '#9f68cf', 800: '#bf9adf', 900: '#dfcdef' },
                        glaucous: { DEFAULT: '#7785ac', 100: '#161a24', 200: '#2c3448', 300: '#424d6c', 400: '#586790', 500: '#7785ac', 600: '#929dbc', 700: '#adb6cd', 800: '#c9cede', 900: '#e4e7ee' },
                        light_blue: { DEFAULT: '#9ac6c5', 100: '#192d2d', 200: '#335a59', 300: '#4c8786', 400: '#6dadac', 500: '#9ac6c5', 600: '#aed1d1', 700: '#c2dddc', 800: '#d7e8e8', 900: '#ebf4f3' },
                        celadon: { DEFAULT: '#a5e6ba', 100: '#113e1f', 200: '#227b3e', 300: '#33b95d', 400: '#65d589', 500: '#a5e6ba', 600: '#b5ebc6', 700: '#c8f0d4', 800: '#daf5e3', 900: '#edfaf1' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-indigo_ink-100 flex justify-center items-center min-h-screen p-0 sm:p-4 text-glaucous-900 font-sans">

    <div class="relative w-full max-w-[412px] h-[892px] bg-indigo_ink-300 rounded-[48px] shadow-2xl border-4 border-indigo_velvet-400 overflow-hidden flex flex-col">
        
        <div class="bg-indigo_ink-400 text-glaucous-800 px-6 pt-3 pb-2 flex justify-between items-center text-xs z-20">
            <span class="font-bold">20:33</span>
            <div class="w-24 h-4 bg-black rounded-full absolute left-1/2 transform -translate-x-1/2 top-2"></div>
            <div class="flex items-center space-x-1">
                <i class="fas fa-signal"></i> <i class="fas fa-wifi"></i> <i class="fas fa-battery-three-quarters"></i>
            </div>
        </div>

        <header class="p-5 text-center mt-4">
            <h1 class="text-2xl font-black text-celadon tracking-widest">MONOMON</h1>
            <p class="text-xs text-glaucous-600 mt-1">Gerencie suas leituras digitais e físicas</p>
        </header>

        <div class="flex border-b border-indigo_velvet-300/40 px-6 bg-indigo_ink-400/30">
            <button id="btn-login" onclick="switchTab('login')" class="flex-1 py-3 text-center text-xs font-black uppercase tracking-wider text-celadon border-b-2 border-celadon transition">
                Entrar
            </button>
            <button id="btn-cadastro" onclick="switchTab('cadastro')" class="flex-1 py-3 text-center text-xs font-black uppercase tracking-wider text-glaucous-700 border-b-2 border-transparent transition">
                Criar Conta
            </button>
        </div>

        <div class="flex-1 p-6 space-y-4 overflow-y-auto no-scrollbar">
            
            <form id="form-login" onsubmit="event.preventDefault(); alert('Login Efetuado!'); window.location.href='index.html';" class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[10px] text-light_blue font-bold uppercase tracking-wider block">E-mail institucional</label>
                    <input type="email" required placeholder="nome@exemplo.com" class="w-full bg-indigo_ink-400 border border-indigo_velvet-300 rounded-xl p-3 text-xs text-glaucous-900 focus:outline-none focus:border-celadon transition">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] text-light_blue font-bold uppercase tracking-wider block">Sua Senha</label>
                    <input type="password" required placeholder="••••••••" class="w-full bg-indigo_ink-400 border border-indigo_velvet-300 rounded-xl p-3 text-xs text-glaucous-900 focus:outline-none focus:border-celadon transition">
                </div>
                <div class="text-right">
                    <a href="#" class="text-[10px] text-glaucous-600 hover:underline">Esqueceu a senha?</a>
                </div>
                <button type="submit" class="w-full bg-celadon text-indigo_ink font-black text-xs py-3 rounded-xl tracking-wider uppercase shadow-md hover:opacity-90 transition mt-2">
                    Conectar Conta
                </button>
            </form>

            <form id="form-cadastro" onsubmit="event.preventDefault(); alert('Cadastro realizado com sucesso!'); switchTab('login');" class="space-y-4 hidden">
                <div class="space-y-1">
                    <label class="text-[10px] text-light_blue font-bold uppercase tracking-wider block">Nome Completo</label>
                    <input type="text" required placeholder="Seu Nome" class="w-full bg-indigo_ink-400 border border-indigo_velvet-300 rounded-xl p-3 text-xs text-glaucous-900 focus:outline-none focus:border-celadon transition">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] text-light_blue font-bold uppercase tracking-wider block">E-mail</label>
                    <input type="email" required placeholder="seu@email.com" class="w-full bg-indigo_ink-400 border border-indigo_velvet-300 rounded-xl p-3 text-xs text-glaucous-900 focus:outline-none focus:border-celadon transition">
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] text-light_blue font-bold uppercase tracking-wider block">Defina uma Senha</label>
                    <input type="password" required placeholder="Mínimo 6 dígitos" class="w-full bg-indigo_ink-400 border border-indigo_velvet-300 rounded-xl p-3 text-xs text-glaucous-900 focus:outline-none focus:border-celadon transition">
                </div>
                <button type="submit" class="w-full bg-indigo_velvet text-celadon font-black text-xs py-3 rounded-xl tracking-wider uppercase shadow-md hover:bg-indigo_velvet-600 transition mt-2 border border-indigo_velvet-400">
                    Finalizar Cadastro
                </button>
            </form>

        </div>

        <nav class="absolute bottom-0 left-0 right-0 bg-indigo_ink-400 border-t border-indigo_velvet-300/80 px-6 py-3 flex justify-between items-center z-20 rounded-b-[44px]">
            <a href="index.html" class="flex flex-col items-center space-y-0.5 text-glaucous-700 hover:text-light_blue transition">
                <i class="fas fa-home text-lg"></i> <span class="text-[9px] font-bold">Início</span>
            </a>
            <a href="catalogo.html" class="flex flex-col items-center space-y-0.5 text-glaucous-700 hover:text-light_blue transition">
                <i class="fas fa-book-reader text-lg"></i> <span class="text-[9px] font-bold">Catálogo</span>
            </a>
            <a href="autenticacao.html" class="flex flex-col items-center space-y-0.5 text-celadon">
                <i class="fas fa-user-circle text-lg"></i> <span class="text-[9px] font-bold">Conta</span>
            </a>
        </nav>
    </div>

    <script>
        function switchTab(tab) {
            const formLogin = document.getElementById('form-login');
            const formCadastro = document.getElementById('form-cadastro');
            const btnLogin = document.getElementById('btn-login');
            const btnCadastro = document.getElementById('btn-cadastro');

            if(tab === 'login') {
                formLogin.classList.remove('hidden');
                formCadastro.classList.add('hidden');
                btnLogin.className = "flex-1 py-3 text-center text-xs font-black uppercase tracking-wider text-celadon border-b-2 border-celadon transition";
                btnCadastro.className = "flex-1 py-3 text-center text-xs font-black uppercase tracking-wider text-glaucous-700 border-b-2 border-transparent transition";
            } else {
                formLogin.classList.add('hidden');
                formCadastro.classList.remove('hidden');
                btnLogin.className = "flex-1 py-3 text-center text-xs font-black uppercase tracking-wider text-glaucous-700 border-b-2 border-transparent transition";
                btnCadastro.className = "flex-1 py-3 text-center text-xs font-black uppercase tracking-wider text-celadon border-b-2 border-celadon transition";
            }
        }
    </script>
</body>
</html>
